<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisVenda | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; transition: 0.3s; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px 20px; display: block; }
        .sidebar a:hover { background: #343a40; color: white; border-left: 4px solid #0d6efd; }
        .card-dash { border: none; border-radius: 10px; transition: 0.3s; }
        .card-dash:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar col-md-2 d-none d-md-block shadow">
            <div class="p-3 text-center">
                <h4 class="fw-bold text-primary">SisVenda</h4>
                <hr>
            </div>
            <a href="/"><i class="fas fa-home me-2"></i> Início</a>
            <a href="/clientes"><i class="fas fa-users me-2"></i> Clientes</a>
            <a href="/produtos"><i class="fas fa-box me-2"></i> Produtos</a>
            <a href="/vendas"><i class="fas fa-shopping-cart me-2"></i> Vendas</a>
            <div class="mt-5">
                <a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt me-2"></i> Sair</a>
            </div>
        </div>

        <div class="flex-grow-1 p-4">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Painel de Controle</h2>
                <span class="badge bg-primary p-2">Usuário: Admin</span>
            </header>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card card-dash shadow-sm p-4 text-center border-start border-info border-5">
                        <i class="fas fa-user-plus fa-2x text-info mb-2"></i>
                        <h5>Novo Cliente</h5>
                        <a href="/clientes" class="btn btn-sm btn-info text-white">Acessar</a>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card card-dash shadow-sm p-4 text-center border-start border-warning border-5">
                        <i class="fas fa-plus-circle fa-2x text-warning mb-2"></i>
                        <h5>Novo Produto</h5>
                        <a href="/produtos" class="btn btn-sm btn-warning text-white">Acessar</a>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card card-dash shadow-sm p-4 text-center border-start border-success border-5">
                        <i class="fas fa-cash-register fa-2x text-success mb-2"></i>
                        <h5>Nova Venda</h5>
                        <a href="/vendas" class="btn btn-sm btn-success">Acessar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
