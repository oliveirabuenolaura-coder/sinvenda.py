<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisVenda | PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px 20px; display: block; }
        .sidebar a:hover { background: #343a40; color: white; border-left: 4px solid #198754; }
        .card { border: none; border-radius: 10px; }
        .total-venda { font-size: 1.5rem; font-weight: bold; color: #198754; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar col-md-2 d-none d-md-block shadow">
            <div class="p-3 text-center"><h4 class="fw-bold text-success">SisVenda</h4><hr></div>
            <a href="/"><i class="fas fa-home me-2"></i> Início</a>
            <a href="/clientes"><i class="fas fa-users me-2"></i> Clientes</a>
            <a href="/produtos"><i class="fas fa-box me-2"></i> Produtos</a>
            <a href="/vendas" class="bg-success text-white fw-bold"><i class="fas fa-cash-register me-2"></i> Vendas</a>
            <div class="mt-5"><a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt me-2"></i> Sair</a></div>
        </div>

        <div class="flex-grow-1 p-4">
            <h2 class="fw-bold mb-4"><i class="fas fa-cart-shopping text-success me-2"></i>Ponto de Venda</h2>
            
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm p-4 border-top border-success border-4">
                        <h5 class="mb-3 text-success">Registrar Venda</h5>
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted small">Cliente</label>
                                <input type="text" name="cliente" class="form-control" placeholder="Nome do cliente" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Produto</label>
                                <input type="text" name="produto" class="form-control" placeholder="Nome do produto" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Valor Total (R$)</label>
                                <input type="number" step="0.01" name="total" class="form-control form-control-lg text-success fw-bold" placeholder="0,00" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold"><i class="fas fa-check me-2"></i>Finalizar Venda</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm p-4">
                        <h5 class="mb-3">Histórico Recente</h5>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle">
                                <thead class="table-dark">
                                    <tr><th>ID</th><th>Cliente</th><th>Produto</th><th>Total</th></tr>
                                </thead>
                                <tbody>
                                    {% for v in vendas %}
                                    <tr>
                                        <td class="text-muted">#{{ v.id }}</td>
                                        <td>{{ v.cliente }}</td>
                                        <td><span class="text-primary">{{ v.produto }}</span></td>
                                        <td class="fw-bold">R$ {{ v.total }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
