<h2>Registrar Venda</h2>
<form method="POST">
    <input name="cliente" placeholder="Cliente" required>
    <input name="produto" placeholder="Produto" required>
    <input name="total" placeholder="Valor Total" required>
    <button type="submit">Vender</button>
</form>
<table border="1">
    <tr><th>Cliente</th><th>Produto</th><th>Total</th></tr>
    {% for v in vendas %}
    <tr><td>{{v.cliente}}</td><td>{{v.produto}}</td><td>R$ {{v.total}}</td></tr>
    {% endfor %}
</table>
<br><a href="/">Voltar</a>
