<h2>Produtos</h2>
<form method="POST">
    <input name="nome" placeholder="Nome Produto" required>
    <input name="preco" placeholder="Preço" required>
    <button type="submit">Salvar</button>
</form>
<table border="1">
    <tr><th>Nome</th><th>Preço</th></tr>
    {% for p in produtos %}
    <tr><td>{{p.nome}}</td><td>R$ {{p.preco}}</td></tr>
    {% endfor %}
</table>
<br><a href="/">Voltar</a>
